#  CI - Build & Test (.NET)
#  Equivalente en GitHub Actions al pipeline YAML de Azure DevOps solicitado.
#
#  Ubicación obligatoria dentro del repo: .github/workflows/ci.yml
#  (GitHub solo detecta workflows dentro de esa ruta exacta)

name: CI - Build & Test

# 2) DISPARADORES (equivalente a "trigger" / "pr" en Azure DevOps)
#    Se ejecuta automáticamente cuando se abre o actualiza un Pull Request
#    hacia develop, qa o master.

on:
  pull_request:
    branches:
      - Develop
      - qa
      - master
  # Opcional: también correrlo en cada push directo a esas ramas
  push:
    branches:
      - develop
      - qa
      - master

# Permisos necesarios para poder publicar los resultados de las pruebas
# como "Checks" y comentarios en el PR.
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build, Test y Publicar Resultados
    runs-on: ubuntu-latest

    env:
      buildConfiguration: 'Release'   # Ajusta si tu curso usa 'Debug'

    steps:
      # Descargar el código del repositorio
      - name: Checkout del código
        uses: actions/checkout@v6

      # Instalar el SDK de .NET
      - name: Configurar .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      #  Restaurar dependencias -> dotnet restore
      - name: Restaurar dependencias
        run: dotnet restore

      #  Compilar el proyecto -> dotnet build
      - name: Compilar el proyecto
        run: dotnet build --configuration ${{ env.buildConfiguration }} --no-restore

      # 3) Ejecutar pruebas unitarias
      - name: Ejecutar pruebas unitarias
        shell: bash
        run: |
          mkdir -p ./TestResults
          encontrados=0
          for proj in $(find . -iregex '.*[Tt]est.*\.csproj$'); do
            encontrados=1
            echo "▶ Ejecutando pruebas en: $proj"
            dotnet test "$proj" \
              --configuration ${{ env.buildConfiguration }} \
              --no-build \
              --logger trx \
              --results-directory ./TestResults \
              --collect:"XPlat Code Coverage"
          done
          if [ "$encontrados" -eq 0 ]; then
            echo "⚠ No se encontró ningún *.csproj de pruebas con el patrón esperado."
            exit 1
          fi

      #  Publicar los resultados de las pruebas (logs y reportes .trx)
      #    Esto crea un "Check" visible directamente en el Pull Request,
      #    igual que la pestaña "Tests" de Azure DevOps.
      #    if: always() -> se ejecuta incluso si las pruebas fallan.
      - name: Publicar resultados de las pruebas
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados de Pruebas Unitarias
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-error: true
          
      # Subir los logs y reportes (.trx + cobertura) como artefacto
      # descargable desde la ejecución del workflow (para tus capturas/evidencias)
     
      - name: Subir logs y reportes como artefacto
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results-${{ github.run_id }}
          path: |
            **/TestResults/**
          retention-days: 15
